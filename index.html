<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdi & Achei | Central de Achados e Perdidos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="hero" id="inicio" aria-label="Inicio">
        <!--Links--->
        <nav class="nav">
            <a class="marca" href="#inicio">
                <img src="logo-perdi-achei.svg" alt="Perdi & Achei" class="marca-img" />
            </a>
            <div class="nav-links" aria-label="Navegação Principal">
                <a href="#cadastro">Cadastrar</a>
                <a href="#registros">Registros</a>


        </nav>
        <section class="hero-content" aria-label="Conteúdo Principal">
            <h1 class="hero-title">Perdeu? Achou? Registre aqui!</h1>
            <p> Uma central simples para Cadastrar objetos perdidos ou encontrados na unipar </p>
            <!-- aqui tinha uma div, passei ela depois da ação-->
            <div class="acao">
                <!--Class = "btn btn-principal": encapsulamento de clases, clases complementares-->
                <a href="#cadastro" class="btn btn-principal">Cadastrar Objeto</a>
                <a href="#registros" class="btn btn-secundario">Ver Registros</a>

            </div>
            </div>

            <!--barra lateral don site-->
            <aside class="hero-card" arial-label="Resumo do Sistema">
                <img src="hero-achados-perdidos.svg" alt="Ilustração de Achados e Perdidos" />
                <div class="hero-metricas">
                    <!--Lembrança para o Futuro: o js vai atualizar isso-->
                    <div>
                        <strong id="total-registros">0</strong>
                        <span>Registros</span>
                    </div>
                </div>
            </aside>
        </section>
    </header>
    <main class="container">
        <section class="grid-principal">
            <!--article: artigo, "foco do site"-->
            <article class="card" id="cadastro">
                <div class="card cabeçalho">
                    <img src="formulario.svg" alt="Formulário de Cadastro" />
                </div>
                <h2>Cadastrar Objeto</h2>
                <p>Informe os dados do objeto</p>
                </div>
            </article>
            <!--auto complete = off, nao sugere campos-->
            <forms id="formObjeto" autocomplete="off">
                <label>Nome do Objeto</label>
                <input type="text" name="objeto" maxlength="80" placeholder="Ex: Mochila, Chave, Carteira" required />
                <!--vou criar uma div para dividir em colunas-->
                <div class="coluna-dois">
                    <label>tipo</label>
                    <!--campo de seleção-->
                    <select name="tipo" required>
                        <option value="">Selecione</option>
                        <option value="perdido">Perdido</option>
                        <option value="encontrado">Encontrado</option>
                    </select>
                    <label>Data</label>
                    <input type="date" name="data" required />
                </div>
                <label>local</label>
                <input type="text" name="local" maxlength="100" placeholder="Ex: Laboratorio 2, Biblioteca, patio" required />
                <label>Descrição</label>
                <textarea name="descricao" maxlength="360" placeholder="Descreva cor, marca, detalhes..." required></textarea>
                <label>Contato</label>
                <input type="text" name="contato" maxlength="100" placeholder="Ex: Email, WhatsApp" required />

                <button type="submit" class="btn btn-form"> Salvar </button>
            </forms>
        </section>
    </main>
</body>

</html>
